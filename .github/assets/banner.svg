<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="g1" cx="20%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#C0FF44" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#C0FF44" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="90%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#4A90D9" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#4A90D9" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" fill="#0A0B12"/>
  <rect width="1200" height="280" fill="url(#g1)"/>
  <rect width="1200" height="280" fill="url(#g2)"/>

  <!-- Logo mark tiles (48x48 viewbox scaled 4x, offset 40,40) -->
  <!-- Large tile -->
  <rect x="52" y="52" width="88" height="88" rx="12" fill="#C0FF44"/>
  <!-- Right top -->
  <rect x="148" y="52" width="72" height="42" rx="8" fill="#C0FF44" fill-opacity="0.55"/>
  <!-- Right bottom -->
  <rect x="148" y="100" width="72" height="40" rx="8" fill="#C0FF44" fill-opacity="0.30"/>
  <!-- Bottom left -->
  <rect x="52" y="148" width="40" height="72" rx="8" fill="#C0FF44" fill-opacity="0.65"/>
  <!-- Bottom mid -->
  <rect x="98" y="148" width="42" height="72" rx="8" fill="#C0FF44" fill-opacity="0.38"/>
  <!-- Bottom right -->
  <rect x="148" y="148" width="72" height="72" rx="8" fill="#C0FF44" fill-opacity="0.18"/>

  <!-- Divider -->
  <line x1="268" y1="56" x2="268" y2="224" stroke="#1E2030" stroke-width="1"/>

  <!-- App name -->
  <text x="300" y="128" font-family="'Courier New', Courier, monospace" font-size="62" font-weight="700" fill="#FFFFFF" letter-spacing="-1">FSExplorer</text>

  <!-- Tagline -->
  <text x="303" y="162" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" fill="#666" letter-spacing="3">DISK SPACE ANALYZER</text>

  <!-- Feature pills -->
  <rect x="302" y="186" width="118" height="26" rx="13" fill="#12151F" stroke="#1E2535" stroke-width="1"/>
  <text x="361" y="203" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" fill="#888">Parallel scan</text>

  <rect x="428" y="186" width="108" height="26" rx="13" fill="#12151F" stroke="#1E2535" stroke-width="1"/>
  <text x="482" y="203" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" fill="#888">Treemap view</text>

  <rect x="544" y="186" width="90" height="26" rx="13" fill="#12151F" stroke="#1E2535" stroke-width="1"/>
  <text x="589" y="203" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" fill="#888">List view</text>

  <rect x="642" y="186" width="98" height="26" rx="13" fill="#12151F" stroke="#1E2535" stroke-width="1"/>
  <text x="691" y="203" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" fill="#888">2M+ files/sec</text>

  <!-- Platform labels -->
  <rect x="302" y="222" width="88" height="22" rx="4" fill="#0078D6" fill-opacity="0.15" stroke="#0078D6" stroke-opacity="0.3" stroke-width="1"/>
  <text x="346" y="237" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" fill="#4DA3FF">Windows</text>

  <rect x="398" y="222" width="78" height="22" rx="4" fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="1"/>
  <text x="437" y="237" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" fill="#AAAAAA">macOS</text>
</svg>
